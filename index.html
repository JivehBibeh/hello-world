<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1 class="title">GAWAD PARANGAL</h1>
        <p class="subtitle">ECE Nights 2026</p>
        <div class="scroll-hint">Swipe up to open</div>
    </div>

    <div id="invite" class="screen hidden">
        <div class="envelope"></div>
        <div class="card hidden">
            <h2 class="card-text">Khade Margaret T. Villegas, will you be my partner for this year's ECE Nights?</h2>
            <div class="actions">
                <button id="yes-btn">Yes</button>
                <button id="no-btn">No</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
